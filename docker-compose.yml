version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ledge_db
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rails_api:
    build:
      context: ./backend_rails
      dockerfile: Dockerfile
    container_name: ledge_rails
    command: /bin/bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b '0.0.0.0' -p 3001"
    volumes:
      - ./backend_rails:/app
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RAILS_ENV: ${RAILS_ENV:-development}

  fastapi_ai:
    build:
      context: ./backend_ai
      dockerfile: Dockerfile
    container_name: ledge_fastapi
    volumes:
      - ./backend_ai:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ledge_frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

volumes:
  mysql_data:
